services:
  postgres:
    image: postgres:16-alpine
    container_name: cs2-p2p-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cs2_p2p_mvp
      POSTGRES_USER: cs2
      POSTGRES_PASSWORD: cs2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs2 -d cs2_p2p_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
