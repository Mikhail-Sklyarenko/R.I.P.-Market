name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cs2_p2p_mvp
          POSTGRES_USER: cs2
          POSTGRES_PASSWORD: cs2
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cs2 -d cs2_p2p_mvp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cs2:cs2@localhost:5432/cs2_p2p_mvp?schema=public
      JWT_SECRET: ci-jwt-secret
      AUTH_PROVIDER: mock
      INVENTORY_PROVIDER: mock
      TRADE_PROVIDER: mock
      FRONTEND_ORIGIN: http://localhost:5173
      ENABLE_MOCK_TRADE: true
      ENABLE_MOCK_DEPOSIT: true
      ENABLE_EXTENSION_CHANNEL: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --ci --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

  ui-e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cs2_p2p_mvp
          POSTGRES_USER: cs2
          POSTGRES_PASSWORD: cs2
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cs2 -d cs2_p2p_mvp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cs2:cs2@localhost:5432/cs2_p2p_mvp?schema=public
      JWT_SECRET: ci-jwt-secret
      AUTH_PROVIDER: mock
      INVENTORY_PROVIDER: mock
      TRADE_PROVIDER: mock
      FRONTEND_ORIGIN: http://localhost:5173
      ENABLE_MOCK_TRADE: true
      ENABLE_MOCK_DEPOSIT: true
      ENABLE_TEST_ROUTES: true
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Prepare database
        working-directory: backend
        run: |
          npm run prisma:generate
          npm run prisma:migrate:deploy

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: UI E2E sell flow
        working-directory: frontend
        run: npm run test:e2e
